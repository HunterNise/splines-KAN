[pytest]
# Suppress DeprecationWarnings originating from matplotlib's internal use of
# pyparsing. These warnings are caused by a version mismatch between the
# installed matplotlib and pyparsing: matplotlib still calls the old camelCase
# pyparsing API (setParseAction, parseString, etc.) which newer pyparsing
# versions have renamed to snake_case and marked deprecated. This is not
# something we can fix — it will resolve when matplotlib ships an update that
# uses the new API.
filterwarnings =
    ignore::DeprecationWarning:matplotlib
